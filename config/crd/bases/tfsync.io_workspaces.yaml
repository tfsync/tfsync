apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workspaces.tfsync.io
spec:
  group: tfsync.io
  names:
    kind: Workspace
    listKind: WorkspaceList
    plural: workspaces
    singular: workspace
    shortNames:
      - ws
    categories:
      - tfsync
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Repo
          type: string
          jsonPath: .spec.source.repo
        - name: Branch
          type: string
          jsonPath: .spec.source.branch
        - name: LastApplied
          type: date
          jsonPath: .status.lastAppliedAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            apiVersion: {type: string}
            kind: {type: string}
            metadata: {type: object}
            spec:
              type: object
              required: [source, backend]
              properties:
                source:
                  type: object
                  required: [repo]
                  properties:
                    repo: {type: string}
                    path: {type: string}
                    branch: {type: string, default: main}
                    secretRef: {type: string}
                syncPolicy:
                  type: object
                  properties:
                    autoApply: {type: boolean}
                    interval: {type: string, default: 5m}
                backend:
                  type: object
                  required: [type]
                  properties:
                    type:
                      type: string
                      enum: [s3, gcs, azurerm, local]
                    secretRef: {type: string}
                credentials:
                  type: object
                  required: [secretRef]
                  properties:
                    secretRef: {type: string}
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Initializing, Planning, Applying, Synced, Failed, OutOfSync]
                lastAppliedAt: {type: string, format: date-time}
                lastPlanOutput: {type: string}
                observedGeneration: {type: integer, format: int64}
                activeJob: {type: string}
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type: {type: string}
                      status: {type: string, enum: ["True", "False", "Unknown"]}
                      observedGeneration: {type: integer, format: int64}
                      lastTransitionTime: {type: string, format: date-time}
                      reason: {type: string}
                      message: {type: string}
