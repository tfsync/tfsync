apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tfsync-controller
rules:
  - apiGroups: [tfsync.io]
    resources: [workspaces]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [tfsync.io]
    resources: [workspaces/status, workspaces/finalizers]
    verbs: [get, update, patch]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
