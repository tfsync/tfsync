apiVersion: tfsync.io/v1alpha1
kind: Workspace
metadata:
  name: example-aws-vpc
  namespace: default
spec:
  source:
    repo: https://github.com/example/infra.git
    path: environments/dev/vpc
    branch: main
  syncPolicy:
    autoApply: false
    interval: 10m
  backend:
    type: s3
    secretRef: tfsync-s3-backend
  credentials:
    secretRef: aws-credentials
